{% load static %}

<!-- POPUP DIÁLOGO INTRO — Desafíos / EdEmy -->

<div id="dialogo-desafio-overlay" aria-modal="true" role="dialog" aria-label="Introducción de EdEmy">
  <div id="dialogo-desafio-backdrop"></div>

  <div id="dialogo-desafio-box">

    <!-- Robot EdEmy -->
    <div class="dd-personaje activo" id="dd-pj-edemy">
      <img src="{% static 'images/EdemSerio.png' %}" alt="EdEmy" class="dd-img">
    </div>

    <!-- Burbuja central -->
    <div class="dd-burbuja" id="dd-burbuja">
      <div class="dd-hablante" id="dd-hablante">EdEmy</div>

      <p class="dd-texto" id="dd-texto"></p>

      <button class="dd-siguiente" id="dd-siguiente" type="button" onclick="ddSiguiente()">
        <span id="dd-btn-label">Siguiente</span>
        <span class="dd-flecha">▶</span>
      </button>

      <div class="dd-progreso">
        <div id="dd-dots"></div>
      </div>
    </div>

  </div>
</div>

<style>
#dialogo-desafio-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity .4s ease;
}

#dialogo-desafio-overlay.visible {
  opacity: 1;
  pointer-events: all;
}

#dialogo-desafio-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 5, 15, 0.68);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}

#dialogo-desafio-box {
  position: relative;
  z-index: 2;
  width: min(760px, calc(100vw - 80px));
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

/* ===== ROBOT ===== */
.dd-personaje {
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  position: relative;
  z-index: 3;
  opacity: 1;
  transform: scale(1.05) translateY(0);
  transition: opacity .4s, transform .4s, filter .4s;
}

.dd-img {
  width: clamp(95px, 12vw, 155px);
  height: auto;
  display: block;
  object-fit: contain;
  margin-right: -12px;
  margin-bottom: -10px;
  filter:
    drop-shadow(0 0 18px rgba(0, 242, 109, 0.35))
    drop-shadow(0 18px 28px rgba(0, 0, 0, 0.55));
}

/* ===== BURBUJA ===== */
.dd-burbuja {
  flex: 1;
  min-width: 0;
  max-width: 580px;
  background: linear-gradient(160deg, rgba(0,16,74,0.97), rgba(3,12,38,0.97));
  border: 1.8px solid rgba(0,242,109,0.72);
  border-radius: 20px;
  padding: 20px 22px 14px;
  box-shadow:
    0 0 30px rgba(0,242,109,.22),
    0 0 80px rgba(0,59,255,.14),
    0 20px 50px rgba(0,0,0,.6);
  position: relative;
  z-index: 2;
  transform: translateY(20px);
  opacity: 0;
  transition: transform .4s cubic-bezier(.34,1.2,.64,1), opacity .4s ease;
}

.dd-burbuja.visible {
  transform: translateY(0);
  opacity: 1;
}

.dd-burbuja::before,
.dd-burbuja::after {
  content: "";
  position: absolute;
  width: 14px;
  height: 14px;
  border-color: rgba(0,242,109,.62);
  border-style: solid;
}

.dd-burbuja::before {
  top: -1px;
  left: -1px;
  border-width: 2px 0 0 2px;
  border-radius: 4px 0 0 0;
}

.dd-burbuja::after {
  top: -1px;
  right: -1px;
  border-width: 2px 2px 0 0;
  border-radius: 0 4px 0 0;
}

.dd-hablante {
  font-family: "Poppins", sans-serif;
  font-size: clamp(10px, 1.1vw, 12px);
  font-weight: 800;
  letter-spacing: 2.5px;
  color: #00F26D;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.dd-texto {
  font-family: "Poppins", sans-serif;
  font-size: clamp(13px, 1.4vw, 16px);
  color: #E6EEF8;
  line-height: 1.6;
  min-height: 56px;
  margin: 0 0 14px 0;
}

.cursor-rpg-dd {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  background: #00F26D;
  vertical-align: text-bottom;
  margin-left: 2px;
  animation: parpadeo-dd .65s step-end infinite;
}

@keyframes parpadeo-dd {
  0%,100% { opacity: 1; }
  50% { opacity: 0; }
}

.dd-siguiente {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 10px 16px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(0,242,109,.18), rgba(0,59,255,.22));
  border: 1.5px solid rgba(0,242,109,.62);
  color: #E6EEF8;
  font-family: "Poppins", sans-serif;
  font-size: clamp(12px, 1.3vw, 14px);
  font-weight: 800;
  cursor: pointer;
  transition: background .2s, transform .15s, border-color .2s;
}

.dd-siguiente:hover {
  background: linear-gradient(135deg, rgba(0,242,109,.28), rgba(0,59,255,.30));
  border-color: rgba(0,242,109,.95);
  transform: translateY(-1px);
}

.dd-flecha {
  font-size: .85em;
  animation: ddFlecha 1s ease-in-out infinite;
}

@keyframes ddFlecha {
  0%,100% { transform: translateX(0); }
  50% { transform: translateX(4px); }
}

.dd-progreso {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

#dd-dots {
  display: flex;
  gap: 6px;
}

.dd-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(0,242,109,.22);
  transition: background .3s, transform .3s;
}

.dd-dot.activo {
  background: #00F26D;
  transform: scale(1.35);
}

.dd-dot.hecho {
  background: rgba(0,242,109,.55);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  #dialogo-desafio-box {
    width: min(650px, calc(100vw - 44px));
  }

  .dd-img {
    width: clamp(82px, 13vw, 125px);
  }
}

@media (max-width: 700px) {
  #dialogo-desafio-box {
    width: calc(100vw - 24px);
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .dd-img {
    width: clamp(90px, 28vw, 130px);
    margin-right: 0;
    margin-bottom: -8px;
  }

  .dd-burbuja {
    width: 100%;
    max-width: none;
    padding: 18px 18px 14px;
  }

  .dd-texto {
    min-height: 74px;
  }
}

@media (prefers-reduced-motion: reduce) {
  * {
    animation: none !important;
    transition: none !important;
  }
}
</style>

<script>
(function () {

  /* ── AUDIO ── */
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let _ctx = null;

  function getCtx() {
    if (!AudioCtx) return null;
    if (!_ctx) _ctx = new AudioCtx();
    if (_ctx.state === "suspended") _ctx.resume();
    return _ctx;
  }

  function sonarTecla() {
    try {
      const c = getCtx();
      if (!c) return;

      const o = c.createOscillator();
      const g = c.createGain();

      o.connect(g);
      g.connect(c.destination);

      o.type = "square";
      o.frequency.setValueAtTime(520, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(380, c.currentTime + 0.04);

      g.gain.setValueAtTime(0.05, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.05);

      o.start(c.currentTime);
      o.stop(c.currentTime + 0.06);
    } catch(_) {}
  }

  function sonarBoton() {
    try {
      const c = getCtx();
      if (!c) return;

      [
        [440, 600, 0, 0.08, 0.18, 0.14],
        [660, 880, 0.06, 0.18, 0.12, 0.22]
      ].forEach(([f1, f2, delay, ramp, vol, stop]) => {
        const o = c.createOscillator();
        const g = c.createGain();

        o.connect(g);
        g.connect(c.destination);

        o.type = "sine";
        o.frequency.setValueAtTime(f1, c.currentTime + delay);
        o.frequency.exponentialRampToValueAtTime(f2, c.currentTime + delay + ramp);

        g.gain.setValueAtTime(vol, c.currentTime + delay);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + stop);

        o.start(c.currentTime + delay);
        o.stop(c.currentTime + delay + stop + 0.02);
      });
    } catch(_) {}
  }

  /* ── GUIÓN EDEMY ── */
  const GUION = [
    {
      nombre: "EdEmy",
      texto: "Protocolo de desafíos iniciado."
    },
    {
      nombre: "EdEmy",
      texto: "Cada misión comienza eligiendo un problema real."
    },
    {
      nombre: "EdEmy",
      texto: "La decisión que tomen ahora marcará el rumbo de su investigación, sus ideas y su futura solución."
    },
    {
      nombre: "EdEmy",
      texto: "No busquen solo lo más fácil. Busquen aquello que puedan comprender, analizar y transformar."
    },
    {
      nombre: "EdEmy",
      texto: "Cuando el equipo esté de acuerdo, presionen «¡Estoy listo!» para avanzar."
    }
  ];

  let paso = 0;
  let escribiendo = false;
  let textoCompleto = "";
  let timerEscritura = null;
  let teclaCounter = 0;

  const overlay = document.getElementById("dialogo-desafio-overlay");
  const burbuja = document.getElementById("dd-burbuja");
  const habEl = document.getElementById("dd-hablante");
  const textoEl = document.getElementById("dd-texto");
  const btnLabel = document.getElementById("dd-btn-label");
  const dotsEl = document.getElementById("dd-dots");

  if (!overlay || !burbuja || !habEl || !textoEl || !btnLabel || !dotsEl) {
    return;
  }

  GUION.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dd-dot";
    d.id = "dd-dot-" + i;
    dotsEl.appendChild(d);
  });

  function actualizarDots() {
    GUION.forEach((_, i) => {
      const d = document.getElementById("dd-dot-" + i);
      if (!d) return;

      d.className = "dd-dot" + (i < paso ? " hecho" : i === paso ? " activo" : "");
    });
  }

  function escribirTexto(txt) {
    textoCompleto = txt;
    escribiendo = true;
    textoEl.innerHTML = "";
    teclaCounter = 0;

    const cursor = document.createElement("span");
    cursor.className = "cursor-rpg-dd";

    let i = 0;

    clearInterval(timerEscritura);

    timerEscritura = setInterval(() => {
      if (i < txt.length) {
        textoEl.textContent = txt.slice(0, i + 1);
        textoEl.appendChild(cursor);

        teclaCounter++;

        if (teclaCounter % 2 === 0 && txt[i] !== " ") {
          sonarTecla();
        }

        i++;
      } else {
        clearInterval(timerEscritura);
        escribiendo = false;
        textoEl.textContent = txt;
      }
    }, 30);
  }

  function mostrarPaso(n) {
    const linea = GUION[n];

    habEl.textContent = linea.nombre;
    actualizarDots();

    btnLabel.textContent = (n === GUION.length - 1) ? "¡Entendido!" : "Siguiente";

    escribirTexto(linea.texto);
  }

  window.ddSiguiente = function () {
    sonarBoton();

    if (escribiendo) {
      clearInterval(timerEscritura);
      escribiendo = false;
      textoEl.textContent = textoCompleto;
      return;
    }

    paso++;

    if (paso >= GUION.length) {
      overlay.classList.remove("visible");
      burbuja.classList.remove("visible");
      return;
    }

    mostrarPaso(paso);
  };

  setTimeout(() => {
    overlay.classList.add("visible");

    setTimeout(() => {
      burbuja.classList.add("visible");
      mostrarPaso(0);
    }, 200);
  }, 600);

})();
</script>
