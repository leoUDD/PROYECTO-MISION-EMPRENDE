<!-- POPUP DIÁLOGO INTRO — Desafíos -->

<div id="dialogo-desafio-overlay" aria-modal="true" role="dialog" aria-label="Introducción de agentes Celeste y Orión">
  <div id="dialogo-desafio-backdrop"></div>
  <div id="dialogo-desafio-box">

    <!-- Personaje IZQUIERDA (foto3 — Celeste, chica rubia) -->
    <div class="dd-personaje izquierda activo" id="dd-pj-izq">
      <img src="/static/images/foto3.webp" alt="Agente Celeste" class="dd-img">
    </div>

    <!-- Burbuja central -->
    <div class="dd-burbuja" id="dd-burbuja">
      <div class="dd-hablante" id="dd-hablante">AGENTE CELESTE</div>
      <p class="dd-texto" id="dd-texto"></p>
      <button class="dd-siguiente" id="dd-siguiente" onclick="ddSiguiente()">
        <span id="dd-btn-label">Siguiente</span>
        <span class="dd-flecha">▶</span>
      </button>
      <div class="dd-progreso">
        <div id="dd-dots"></div>
      </div>
    </div>

    <!-- Personaje DERECHA (foto4 — Orión, chico moreno) -->
    <div class="dd-personaje derecha inactivo" id="dd-pj-der">
      <img src="/static/images/foto4.webp" alt="Agente Orión" class="dd-img">
    </div>

  </div>
</div>

<style>
#dialogo-desafio-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity .4s ease;
}
#dialogo-desafio-overlay.visible {
  opacity: 1;
  pointer-events: all;
}

#dialogo-desafio-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 5, 15, 0.68);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}

#dialogo-desafio-box {
  position: relative;
  z-index: 2;
  width: min(760px, calc(100vw - 200px));
  margin-left: 140px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.dd-personaje {
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  transition: opacity .4s, transform .4s, filter .4s;
  position: relative;
  z-index: 3;
}
.dd-personaje.inactivo {
  opacity: 0.40;
  filter: grayscale(45%) brightness(0.65);
  transform: scale(0.93) translateY(6px);
}
.dd-personaje.activo {
  opacity: 1;
  filter: none;
  transform: scale(1.05) translateY(0);
}

.dd-img {
  width: clamp(120px, 15vw, 200px);
  height: auto;
  display: block;
  object-fit: contain;
  margin-bottom: -8px;
}

.dd-burbuja {
  flex: 1;
  min-width: 0;
  background: linear-gradient(160deg, rgba(4,16,34,0.97), rgba(6,22,46,0.97));
  border: 1.8px solid rgba(0,200,255,0.75);
  border-radius: 20px;
  padding: 20px 22px 14px;
  box-shadow:
    0 0 30px rgba(0,180,255,.28),
    0 0 80px rgba(0,100,255,.14),
    0 20px 50px rgba(0,0,0,.6);
  position: relative;
  z-index: 2;
  margin: 0 -6px;
  transform: translateY(20px);
  opacity: 0;
  transition: transform .4s cubic-bezier(.34,1.2,.64,1), opacity .4s ease;
}
.dd-burbuja.visible {
  transform: translateY(0);
  opacity: 1;
}

.dd-burbuja::before,
.dd-burbuja::after {
  content: "";
  position: absolute;
  width: 14px; height: 14px;
  border-color: rgba(0,200,255,.6);
  border-style: solid;
}
.dd-burbuja::before { top:-1px; left:-1px; border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
.dd-burbuja::after  { top:-1px; right:-1px; border-width:2px 2px 0 0; border-radius:0 4px 0 0; }

.dd-hablante {
  font-family: "Poppins", sans-serif;
  font-size: clamp(10px, 1.1vw, 12px);
  font-weight: 700;
  letter-spacing: 2.5px;
  color: #FF7A1A;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.dd-texto {
  font-family: "Poppins", sans-serif;
  font-size: clamp(13px, 1.4vw, 16px);
  color: #E6EEF8;
  line-height: 1.6;
  min-height: 52px;
  margin: 0 0 14px 0;
}

.cursor-rpg-dd {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  background: #00C8FF;
  vertical-align: text-bottom;
  margin-left: 2px;
  animation: parpadeo-dd .65s step-end infinite;
}
@keyframes parpadeo-dd { 0%,100%{opacity:1} 50%{opacity:0} }

.dd-siguiente {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 10px 16px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(0,200,255,.18), rgba(0,120,255,.18));
  border: 1.5px solid rgba(0,200,255,.60);
  color: #E6EEF8;
  font-family: "Poppins", sans-serif;
  font-size: clamp(12px, 1.3vw, 14px);
  font-weight: 700;
  cursor: pointer;
  transition: background .2s, transform .15s, border-color .2s;
}
.dd-siguiente:hover {
  background: linear-gradient(135deg, rgba(0,200,255,.30), rgba(0,120,255,.28));
  border-color: rgba(0,200,255,.90);
  transform: translateY(-1px);
}

.dd-flecha {
  font-size: .85em;
  animation: ddFlecha 1s ease-in-out infinite;
}
@keyframes ddFlecha { 0%,100%{transform:translateX(0)} 50%{transform:translateX(4px)} }

.dd-progreso { display:flex; justify-content:center; margin-top:10px; }
#dd-dots { display:flex; gap:6px; }
.dd-dot {
  width:6px; height:6px; border-radius:50%;
  background:rgba(0,200,255,.22);
  transition: background .3s, transform .3s;
}
.dd-dot.activo { background:#00C8FF; transform:scale(1.35); }
.dd-dot.hecho  { background:rgba(0,200,255,.55); }

@media (max-width: 900px) {
  #dialogo-desafio-box { width: min(620px, calc(100vw - 140px)); margin-left: 100px; }
}
@media (max-width: 700px) {
  #dialogo-desafio-box { width: calc(100vw - 24px); margin-left: 0; }
  .dd-img { width: clamp(85px, 15vw, 140px); }
}
</style>

<script>
(function () {

  /* ── AUDIO ── */
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let _ctx = null;
  function getCtx() {
    if (!_ctx) _ctx = new AudioCtx();
    if (_ctx.state === "suspended") _ctx.resume();
    return _ctx;
  }

  function sonarTecla() {
    try {
      const c = getCtx();
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = "square";
      o.frequency.setValueAtTime(520, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(380, c.currentTime + 0.04);
      g.gain.setValueAtTime(0.05, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.05);
      o.start(c.currentTime); o.stop(c.currentTime + 0.06);
    } catch(_) {}
  }

  function sonarBoton() {
    try {
      const c = getCtx();
      [[440, 600, 0, 0.08, 0.18, 0.14], [660, 880, 0.06, 0.18, 0.12, 0.22]].forEach(([f1,f2,delay,ramp,vol,stop]) => {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = "sine";
        o.frequency.setValueAtTime(f1, c.currentTime + delay);
        o.frequency.exponentialRampToValueAtTime(f2, c.currentTime + delay + ramp);
        g.gain.setValueAtTime(vol, c.currentTime + delay);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + stop);
        o.start(c.currentTime + delay); o.stop(c.currentTime + delay + stop + 0.02);
      });
    } catch(_) {}
  }

  /* ── GUIÓN ── */
  const GUION = [
    { hab: "izq", nombre: "AGENTE CELESTE",
      texto: "¡Atención, agentes! Soy Celeste y él es Orión. Estamos aquí para guiarlos en esta fase." },
    { hab: "der", nombre: "AGENTE ORIÓN",
      texto: "Cada misión comienza eligiendo un desafío. La decisión que tomen ahora marcará el rumbo del equipo." },
    { hab: "izq", nombre: "AGENTE CELESTE",
      texto: "No hay respuestas incorrectas, pero sí hay equipos que piensan mejor en conjunto." },
    { hab: "der", nombre: "AGENTE ORIÓN",
      texto: "Discutan, alinéense y elijan con convicción. El desafío que escojan será el núcleo de su misión." },
    { hab: "izq", nombre: "AGENTE CELESTE",
      texto: "Cuando el equipo esté de acuerdo, presionen «¡Estoy listo!». ¡Adelante, agentes!" },
  ];

  let paso = 0;
  let escribiendo = false;
  let textoCompleto = "";
  let timerEscritura = null;
  let teclaCounter = 0;

  const overlay  = document.getElementById("dialogo-desafio-overlay");
  const burbuja  = document.getElementById("dd-burbuja");
  const habEl    = document.getElementById("dd-hablante");
  const textoEl  = document.getElementById("dd-texto");
  const btnLabel = document.getElementById("dd-btn-label");
  const dotsEl   = document.getElementById("dd-dots");
  const pjIzq    = document.getElementById("dd-pj-izq");
  const pjDer    = document.getElementById("dd-pj-der");

  /* Dots */
  GUION.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dd-dot";
    d.id = "dd-dot-" + i;
    dotsEl.appendChild(d);
  });

  function actualizarDots() {
    GUION.forEach((_, i) => {
      const d = document.getElementById("dd-dot-" + i);
      d.className = "dd-dot" + (i < paso ? " hecho" : i === paso ? " activo" : "");
    });
  }

  function actualizarPersonajes(hab) {
    pjIzq.className = "dd-personaje izquierda " + (hab === "izq" ? "activo" : "inactivo");
    pjDer.className = "dd-personaje derecha "   + (hab === "der" ? "activo" : "inactivo");
  }

  function escribirTexto(txt) {
    textoCompleto = txt;
    escribiendo = true;
    textoEl.innerHTML = "";
    teclaCounter = 0;

    const cursor = document.createElement("span");
    cursor.className = "cursor-rpg-dd";

    let i = 0;
    clearInterval(timerEscritura);
    timerEscritura = setInterval(() => {
      if (i < txt.length) {
        textoEl.textContent = txt.slice(0, i + 1);
        textoEl.appendChild(cursor);
        teclaCounter++;
        if (teclaCounter % 2 === 0 && txt[i] !== " ") sonarTecla();
        i++;
      } else {
        clearInterval(timerEscritura);
        escribiendo = false;
        textoEl.textContent = txt;
      }
    }, 30);
  }

  function mostrarPaso(n) {
    const linea = GUION[n];
    habEl.textContent = linea.nombre;
    actualizarPersonajes(linea.hab);
    actualizarDots();
    btnLabel.textContent = (n === GUION.length - 1) ? "¡Entendido!" : "Siguiente";
    escribirTexto(linea.texto);
  }

  window.ddSiguiente = function () {
    sonarBoton();
    if (escribiendo) {
      clearInterval(timerEscritura);
      escribiendo = false;
      textoEl.textContent = textoCompleto;
      return;
    }
    paso++;
    if (paso >= GUION.length) {
      overlay.classList.remove("visible");
      return;
    }
    mostrarPaso(paso);
  };

  /* Arrancar automáticamente */
  setTimeout(() => {
    overlay.classList.add("visible");
    setTimeout(() => {
      burbuja.classList.add("visible");
      mostrarPaso(0);
    }, 200);
  }, 600);

})();
</script>
