{% load static %}
{% include "atajos.html" %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Misión Emprende UDD — Bienvenida</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/estilo_pantalla_inicio.css' %}">
</head>
<body data-sesion-id="{{ grupo.sesion.idsesion }}">
  <main class="transition-container">
    <section class="card">

      <div class="logo">
        <img src="{% static 'images/logo.webp' %}" alt="Logo Misión Emprende">
      </div>

      <h1 data-i18n="bienvenida_title">¡Has sido reclutado para la misión!</h1>

      <div class="console-card">
  <p
    class="console-title console-line"
    data-i18n-text="bienvenida_reclutamiento"
    data-text="RECLUTAMIENTO CONFIRMADO">
  </p>

  <p class="console-line">
    <span class="console-label" data-i18n="bienvenida_rol_label">Rol asignado:</span>
    <span class="console-val" data-i18n-text="bienvenida_rol_valor" data-text=" Agente en entrenamiento"></span>
  </p>

  <p class="console-line">
    <span class="console-label" data-i18n="bienvenida_fase_label">Fase actual:</span>
    <span class="console-val" data-i18n-text="bienvenida_fase_valor" data-text=" Activación"></span>
  </p>

  <p class="console-line">
    <span class="console-label" data-i18n="bienvenida_estado_label">Estado:</span>
    <span class="console-val" data-i18n-text="bienvenida_estado_valor" data-text=" Preparado para iniciar"></span>
  </p>

  <p class="console-prompt console-line">
    <span class="console-val" data-i18n-text="bienvenida_aceptar" data-text="¿Aceptar misión?"></span>
  </p>
</div>

      <div class="next-step">
       <button class="btn-chip" id="btnComenzar" type="button" data-i18n="bienvenida_boton_listo">
  ¡Estoy listo!
</button>
        <p id="estado-listo-lobby" style="margin-top: 10px;">0/0 grupos listos</p>
      </div>

    </section>
  </main>

  <!-- Música de fondo -->
  <audio id="musica-fondo" src="{% static 'sounds/musica_reclutamiento.mp3' %}" loop preload="auto"></audio>

  {% include "includes/sincronizacion_fase.html" %}

  <script>
  // ── Música de fondo ──
  const musicaFondo = document.getElementById("musica-fondo");
  musicaFondo.volume = 1;

  function intentarReproducir() {
    musicaFondo.play().catch(() => {
      const reanudar = () => {
        musicaFondo.play().catch(() => {});
        document.removeEventListener("click", reanudar);
        document.removeEventListener("touchstart", reanudar);
      };
      document.addEventListener("click", reanudar, { once: true });
      document.addEventListener("touchstart", reanudar, { once: true });
    });
  }

  intentarReproducir();

  // ── Typewriter ──
  let sharedCtx = null;
  function getCtx() {
    if (!sharedCtx || sharedCtx.state === 'closed') {
      sharedCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return sharedCtx;
  }

  function makeTypewriterSound() {
    try {
      const ctx  = getCtx();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.value = 160 + Math.random() * 140;
      const t = ctx.currentTime;
      gain.gain.setValueAtTime(0.035, t);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
      osc.start(t); osc.stop(t + 0.05);
    } catch(e) {}
  }

  function typewrite(el, text, cb) {
    el.textContent = '';
    let i = 0;
    function tick() {
      if (i < text.length) {
        el.textContent += text[i++];
        makeTypewriterSound();
        setTimeout(tick, 32 + Math.random() * 28);
      } else {
        setTimeout(cb, 150);
      }
    }
    tick();
  }

  function tJuego(clave, fallback = "") {
  const idioma = window.i18nJuego?.obtenerIdioma?.() || "es";
  return window.i18nJuego?.traducciones?.[idioma]?.[clave] || fallback;
}

function actualizarTextosTypewriter() {
  document.querySelectorAll("[data-i18n-text]").forEach(el => {
    const clave = el.getAttribute("data-i18n-text");
    const fallback = el.getAttribute("data-text") || "";
    el.setAttribute("data-text", tJuego(clave, fallback));
  });
}

function typewriteSequence(elements) {
  actualizarTextosTypewriter();

  let i = 0;

  function next() {
    if (i >= elements.length) return;

    const el = elements[i++];
    const text = el.getAttribute("data-text") || "";
    typewrite(el, text, next);
  }

  setTimeout(next, 500);
}

  typewriteSequence([...document.querySelectorAll('[data-text]')]);

  // ── Sincronización original intacta ──
  (function () {
    const boton = document.getElementById("btnComenzar");
    const estado = document.getElementById("estado-listo-lobby");
    const sesionId = "{{ grupo.sesion.idsesion }}";
    const grupoId = "{{ grupo.idgrupo }}";

    async function refrescarEstado() {
      try {
        const res = await fetch(`/sesion/${sesionId}/estado/`);
        const data = await res.json();

        const listos = data.gruposListosLobby || 0;
        const total = data.totalGrupos || 0;
        estado.textContent = `${listos}/${total} ${tJuego("bienvenida_grupos_listos", "grupos listos")}`;

        const miGrupo = (data.grupos || []).find(g => Number(g.id) === Number(grupoId));
        if (miGrupo && miGrupo.listoLobby) {
          boton.disabled = true;
          boton.textContent = tJuego("bienvenida_boton_listo_ok", "¡Listo!");
        }

        if (data.faseActual !== "f1_bienvenida" && data.rutaAlumno) {
          window.location.href = data.rutaAlumno;
        }
      } catch (e) {
        console.error(e);
      }
    }

    boton.addEventListener("click", async () => {
      boton.disabled = true;

      try {
        const res = await fetch(`/grupo/${grupoId}/listo/`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
          },
          body: JSON.stringify({ fase: "lobby" })
        });

        const data = await res.json();

        if (data.ok) {
          estado.textContent = `${data.gruposListos}/${data.totalGrupos} ${tJuego("bienvenida_grupos_listos", "grupos listos")}`;
          boton.textContent = tJuego("bienvenida_boton_listo_ok", "¡Listo!");

          if (data.faseActual !== "f1_bienvenida" && data.rutaAlumno) {
            window.location.href = data.rutaAlumno;
            return;
          }
        } else {
          boton.disabled = false;
          boton.textContent = tJuego("bienvenida_boton_listo", "¡Estoy listo!");
        }
      } catch (e) {
        boton.disabled = false;
        boton.textContent = tJuego("bienvenida_boton_listo", "¡Estoy listo!");
        console.error(e);
      }
    });

    setInterval(refrescarEstado, 2000);
    refrescarEstado();
  })();
  </script>

</body>
</html>
